[build]
builder = "NIXPACKS"
buildCommand = "pip install -r requirements.txt"

[deploy]
startCommand = "uvicorn server:app --host 0.0.0.0 --port $PORT --workers 2"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[deploy.healthcheck]
path = "/health"
timeout = 10

[[services]]
name = "api"
startCommand = "uvicorn server:app --host 0.0.0.0 --port $PORT --workers 2"

[[services]]
name = "morning-brief"
startCommand = "python morning_brief.py --skip-fetch"
cronSchedule = "0 23 * * 0-4"   # 6:00 AM GMT+7 = 23:00 UTC Mon-Fri (prev day)
